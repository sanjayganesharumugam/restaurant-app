<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Elegance - Order Confirmation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo-link">
                    <span class="logo">Restaurant Elegance</span>
                </a>
                <button class="hamburger" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="nav-panel">
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="cart.html">Cart</a></li>
                        <li><a href="orders.html" class="active">Orders</a></li>
                        <li><a href="feedback.html">Contact</a></li>
                    </ul>
                    
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="order-section" id="orders">
            <div class="container order-layout">
                <div class="section-heading">
                    <p class="eyebrow">Order Confirmation</p>
                    <h1>Review your order and choose payment method</h1>
                </div>

                <div class="order-grid">
                    <div class="order-summary card-panel">
                        <h2><i class="fas fa-shopping-bag"></i> Order Summary</h2>
                        <div id="orderPreview" class="cart-preview"></div>
                        <div class="summary-total">
                            Total: <span id="orderTotal">&#8377;0</span>
                        </div>
                    </div>

                    <div class="delivery-details card-panel">
                        <h2><i class="fas fa-truck"></i> Delivery Details</h2>
                        <div id="deliveryInfo"></div>
                    </div>
                </div>

                <div class="payment-section">
                    <div class="payment-buttons">
                        <button id="cashOnDeliveryBtn" class="payment-btn cash-btn">Cash on Delivery</button>
                        <button id="payOnlineBtn" class="payment-btn online-btn">Pay Online</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Restaurant Elegance. All rights reserved.</p>
        </div>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/script.js"></script>
</body>
</html></content>
